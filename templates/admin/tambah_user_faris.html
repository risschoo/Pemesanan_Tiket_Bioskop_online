{% extends 'base_faris.html' %}
{% block title %}Tambah User{% endblock %}

{% block content %}
<div class="auth-box" style="max-width:500px;">
    <h2><i class="fa-solid fa-user-plus"></i> Tambah User Baru</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama_faris" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email_faris" placeholder="Masukkan email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="text" name="password_faris" placeholder="Masukkan password" required>  
        </div>
        <div class="form-group">
            <label>No. HP</label>
            <input type="text" name="no_hp_faris" placeholder="Contoh: 08123456789">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role_faris" required>
                <option value="pengguna">Pengguna (Customer)</option>
                <option value="pengelola">Pengelola (Operator)</option>
                <option value="admin">Admin (Super User)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Simpan User</button>
        <a href="{{ url_for('admin_user_faris') }}" style="display:block; text-align:center; margin-top:12px; color:#cc0000;">
            ← Kembali
        </a>
    </form>
</div>
{% endblock %}
