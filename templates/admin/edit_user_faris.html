{% extends 'base_faris.html' %}
{% block title %}Edit User{% endblock %}

{% block content %}
<div class="auth-box" style="max-width:500px;">
    <h2><i class="fa-solid fa-user-pen"></i> Edit User</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama_faris" value="{{ user['nama_faris'] }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email_faris" value="{{ user['email_faris'] }}" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="text" name="password_faris" placeholder="Masukkan password baru jika ingin diubah">
        </div>
        <div class="form-group">
            <label>No. HP</label>
            <input type="text" name="no_hp_faris" value="{{ user['no_hp_faris'] or '' }}" placeholder="Contoh: 08123456789">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role_faris" required>
                <option value="pengguna" {{ 'selected' if user['role_faris'] == 'pengguna' }}>Pengguna (Customer)</option>
                <option value="pengelola" {{ 'selected' if user['role_faris'] == 'pengelola' }}>Pengelola (Operator)</option>
                <option value="admin" {{ 'selected' if user['role_faris'] == 'admin' }}>Admin (Super User)</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-save"></i> Simpan Perubahan
        </button>
        <a href="{{ url_for('admin_user_faris') }}" 
           style="display:block; text-align:center; margin-top:12px; color:#cc0000;">
            ← Kembali
        </a>
    </form>
</div>
{% endblock %}
