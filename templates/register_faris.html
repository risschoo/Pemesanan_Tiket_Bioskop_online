{% extends 'base_faris.html' %}
{% block title %}Daftar Akun{% endblock %}
{% block content %}
<div class="auth-box">
    <h2><i class="fa-solid fa-user-plus"></i> Daftar Akun</h2>
    <form method="POST" id="form-register-faris">
        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Nama Lengkap</label>
            <input type="text" name="nama_faris" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-envelope"></i> Email</label>
            <input type="email" name="email_faris" placeholder="Masukkan email" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-phone"></i> No. HP</label>
            <input type="text" name="no_hp_faris" placeholder="Contoh: 08123456789">
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password_faris" id="password_faris" placeholder="Buat password" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Konfirmasi Password</label>
            <input type="password" name="konfirmasi_password_faris" id="konfirmasi_password_faris" placeholder="Ulangi password" required>
            <small id="pesan-konfirmasi-faris" style="color: red; display: none;">Password tidak cocok!</small>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-user-plus"></i> Daftar Sekarang
        </button>
    </form>
    <p class="auth-link">Sudah punya akun? <a href="{{ url_for('login_faris') }}">Login di sini</a></p>
</div>

<script>
    const formFaris = document.getElementById('form-register-faris');
    const passwordFaris = document.getElementById('password_faris');
    const konfirmasiFaris = document.getElementById('konfirmasi_password_faris');
    const pesanFaris = document.getElementById('pesan-konfirmasi-faris');

    konfirmasiFaris.addEventListener('input', function () {
        if (passwordFaris.value !== konfirmasiFaris.value) {
            pesanFaris.style.display = 'block';
            konfirmasiFaris.setCustomValidity('Password tidak cocok!');
        } else {
            pesanFaris.style.display = 'none';
            konfirmasiFaris.setCustomValidity('');
        }
    });

    formFaris.addEventListener('submit', function (e) {
        if (passwordFaris.value !== konfirmasiFaris.value) {
            e.preventDefault();
            pesanFaris.style.display = 'block';
            konfirmasiFaris.focus();
        }
    });
</script>
{% endblock %}
