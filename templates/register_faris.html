{% extends 'base_faris.html' %}
{% block title %}Daftar Akun{% endblock %}
{% block content %}
<div class="auth-box">
    <h2><i class="fa-solid fa-user-plus"></i> Daftar Akun</h2>
    <form method="POST">
        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Nama Lengkap</label>
            <input type="text" name="nama_faris" placeholder="Masukkan nama lengkap" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-envelope"></i> Email</label>
            <input type="email" name="email_faris" placeholder="Masukkan email" required>
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-phone"></i> No. HP</label>
            <input type="text" name="no_hp_faris" placeholder="Contoh: 08123456789">
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password_faris" placeholder="Buat password" required>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-user-plus"></i> Daftar Sekarang
        </button>
    </form>
    <p class="auth-link">Sudah punya akun? <a href="{{ url_for('login_faris') }}">Login di sini</a></p>
</div>
{% endblock %}
